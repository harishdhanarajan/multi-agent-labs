models:
  planner:
    provider: anthropic
    model: claude-sonnet-4-0
    max_tokens: 4096

  coder:
    provider: openai
    model: gpt-4o
    max_tokens: 4096

  reviewer:
    provider: anthropic
    model: claude-sonnet-4-0
    max_tokens: 4096

  tester:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 4096

  debugger:
    provider: openai
    model: gpt-4o
    max_tokens: 4096

  documenter:
    provider: openai
    model: gpt-4o-mini
    max_tokens: 2048

fallback:
  provider: replicate
  model: meta/meta-llama-3-70b-instruct
  max_tokens: 4096

safety:
  protected_paths:
    - agents/
    - orchestrator/
    - configs/
  allowed_paths:
    - workspace/
